name: Build K40 Module (ARM64)
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 安装标准交叉编译工具链 (gcc-aarch64-linux-gnu)
      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev

      # 克隆小米开源内核 (ares 4.14.186)
      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch ares-r-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel
          # 如果分支不对，可改用 https://github.com/LineageOS/android_kernel_xiaomi_ares.git -b lineage-18.1

      # 用你的 config 覆盖，并准备编译环境
      - name: Apply config and prepare
        run: |
          cp kernel_config kernel/.config
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      # 编译你的内核模块（源码在仓库根目录）
      - name: Build module
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -C $(pwd)/kernel M=$(pwd) modules

      # 将 .ko 嵌入 install.sh（并添加强制加载逻辑）
      - name: Create installer
        run: |
          BASE64_KO=$(base64 -w 0 kern_chan.ko)
          cat > install.sh << 'EOF'
          #!/system/bin/sh
          set -e
          echo "[1/3] 解码模块..."
          TMP_KO=/data/local/tmp/kern_chan.ko
          echo '$BASE64_KO' | base64 -d > $TMP_KO
          chmod 644 $TMP_KO

          echo "[2/3] 加载模块..."
          # 先尝试普通加载
          if insmod $TMP_KO 2>/dev/null; then
            echo "普通加载成功"
          else
            echo "普通加载失败，尝试强制加载 (insmod -f)..."
            insmod -f $TMP_KO
          fi

          sleep 1
          if [ -e /dev/kern_chan ]; then
            echo "========================================"
            echo ">>> 连接地址: /dev/kern_chan"
            echo ">>> 重启后模块自动消失"
            echo "========================================"
          else
            echo "错误：设备节点未创建，请运行 dmesg 查看"
            exit 1
          fi
          EOF
          chmod +x install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: install.sh
