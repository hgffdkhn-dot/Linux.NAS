name: Build Installer
on: push
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create Installer Script
        run: bash make_installer.sh
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-chan-installer
          path: install.sh
