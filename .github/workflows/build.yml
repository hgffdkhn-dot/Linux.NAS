name: Build K40 Kernel Module

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev

      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch ares-r-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel

      - name: Apply custom config
        run: |
          if [ -d "kernel_config" ]; then echo "kernel_config is a directory!"; exit 1; fi
          cp kernel_config kernel/.config
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Prepare modules build
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build module
        id: build
        run: |
          export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
          make -C $(pwd)/kernel M=$(pwd) modules 2>&1 | tee build.log
          # 检查是否生成了 ko
          if [ -f "kern_chan.ko" ]; then
            echo "ko_exists=true" >> $GITHUB_ENV
          else
            echo "ko_exists=false" >> $GITHUB_ENV
            echo "构建失败：未生成 kern_chan.ko"
            echo "=== build.log 最后 100 行 ==="
            tail -100 build.log
            exit 1
          fi

      - name: Verify ko size
        if: env.ko_exists == 'true'
        run: |
          ls -la kern_chan.ko
          if [ ! -s "kern_chan.ko" ]; then
            echo "kern_chan.ko 为空文件"
            exit 1
          fi

      - name: Create installer
        if: env.ko_exists == 'true'
        run: |
          BASE64_KO=$(base64 -w 0 kern_chan.ko)
          cat > install.sh << 'EOF'
          #!/system/bin/sh
          set -e
          echo "[1/3] 解码模块..."
          TMP_KO=/data/local/tmp/kern_chan.ko
          echo '$BASE64_KO' | base64 -d > $TMP_KO
          chmod 644 $TMP_KO
          SIZE=$(stat -c %s $TMP_KO 2>/dev/null || stat -f %z $TMP_KO 2>/dev/null)
          if [ -z "$SIZE" ] || [ "$SIZE" -eq 0 ]; then
              echo "错误：解码后的模块为空！"
              exit 1
          fi
          echo "[2/3] 加载模块..."
          if insmod $TMP_KO; then
              echo "加载成功"
          else
              echo "加载失败，内核日志："
              dmesg | tail -20
              exit 1
          fi
          sleep 1
          if [ -e /dev/kern_chan ]; then
              echo "========================================"
              echo ">>> 连接地址: /dev/kern_chan"
              echo ">>> 重启后模块自动消失"
              echo "========================================"
          else
              echo "错误：设备节点未创建，请检查 dmesg"
              exit 1
          fi
          EOF
          chmod +x install.sh

      - name: Upload installer
        if: env.ko_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: install.sh
